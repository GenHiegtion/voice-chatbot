services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ordering-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      HF_HOME: /cache/hf
      TORCH_HOME: /cache/torch
      REDIS_ENABLED: "true"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_TTL_SECONDS: ${REDIS_TTL_SECONDS:-3600}
      # When TOOL_PROVIDER=mcp, the app must reach the mcp container by its
      # service name (not 0.0.0.0 which is the bind address of the server).
      MCP_CLIENT_HOST: mcp
    volumes:
      - hf-cache:/cache/hf
      - torch-cache:/cache/torch
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mcp:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ordering-mcp
    env_file:
      - ../.env
    environment:
      HF_HOME: /cache/hf
      TORCH_HOME: /cache/torch
      REDIS_ENABLED: "true"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_TTL_SECONDS: ${REDIS_TTL_SECONDS:-3600}
      MCP_ENABLED: "true"
      MCP_TRANSPORT: ${MCP_TRANSPORT:-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8002}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_LOG_LEVEL: ${MCP_LOG_LEVEL:-INFO}
    command: ["uv", "run", "python", "scripts/run_mcp_server.py"]
    volumes:
      - hf-cache:/cache/hf
      - torch-cache:/cache/torch
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=2)\""]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ordering-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  mysql:
    image: mysql:8
    container_name: ordering-mysql
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  redis-data:
  mysql-data:
  hf-cache:
  torch-cache:
